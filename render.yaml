
services:
  - type: web
    name: nexus-ai
    env: node
    plan: free
    buildCommand: npm install
    startCommand: node backend/index.js
    autoDeploy: true
    envVars:
      - key: TRADING_MODE
        value: paper
      - key: ALLOW_LIVE_TRADING
        value: false
      - key: BINANCE_BASE_URL
        value: https://fapi.binance.com
      - key: OKX_BASE_URL
        value: https://www.okx.com
      - key: SUPABASE_ENABLED
        value: true
      - key: ENABLE_REMOTE_SYNC
        value: true
      - key: ENABLE_AI_PERSISTENCE
        value: true
